<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#F7F3FB;min-height:100vh;}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#333;color:#fff;border-radius:20px;padding:8px 20px;font-size:13px;z-index:1100;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.2);pointer-events:none;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;}
.modal-body{overflow-y:auto;padding:16px;flex:1;}
.card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(155,111,212,0.09);}
.tab-btn{flex:1;padding:10px 0;border:none;background:transparent;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-2px;}
.nav-btn{background:none;border:none;padding:4px 8px;display:flex;flex-direction:column;align-items:center;gap:1px;}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const SD=new Date(2026,5,25),ED=new Date(2026,7,8);
const GK=44.0,SK=48.0;
const WT=[47.0,46.2,45.5,44.8,44.2,44.0];
const DL=["日","月","火","水","木","金","土"];
const PG="linear-gradient(135deg,#F7C5D8 0%,#C9B4F0 100%)";
const BN={"筋トレ":220,"有酸素":280,"休養":60};
const DM={
  0:{lunch:{name:"鶏むね肉の味噌漬け定食",items:["鶏むね肉100g","雑穀ご飯100g","味噌汁（わかめ・豆腐）","ぬか漬けきゅうり"],kcal:430,note:"味噌・ぬか漬けで腸活◎"},dinner:{name:"鮭のムニエル＋根菜スープ",items:["鮭100g","ブロッコリー","キャベツのレモン和え","根菜の豆乳味噌スープ"],kcal:370,note:"豆乳×味噌で発酵ダブル"}},
  1:{lunch:{name:"豆腐と野菜の韓国風ビビンバ",items:["雑穀ご飯100g","豆腐50g","ほうれん草ナムル","キムチ少量","温泉卵"],kcal:410,note:"キムチで腸活◎"},dinner:{name:"鶏むね肉のサラダチキン",items:["サラダチキン120g","トマト","アボカド","オリーブオイルドレッシング","ヨーグルトスープ"],kcal:340,note:"ヨーグルトで腸活"}},
  2:{lunch:{name:"納豆と卵のそぼろ丼",items:["雑穀ご飯100g","納豆1パック","炒り卵","ほうれん草","大根おろし"],kcal:420,note:"納豆で腸活◎◎"},dinner:{name:"豚しゃぶサラダ",items:["豚もも肉100g","千切りキャベツ","水菜","ポン酢","味噌汁（なめこ・豆腐）"],kcal:350,note:"なめこ×味噌で腸活"}},
  3:{lunch:{name:"さばの味噌煮定食",items:["さば80g","雑穀ご飯100g","ひじきの煮物","ぬか漬け大根","豆腐の味噌汁"],kcal:440,note:"発酵×食物繊維◎"},dinner:{name:"白身魚のアクアパッツァ",items:["白身魚100g","トマト","アスパラ","きのこ類","ヨーグルトスープ"],kcal:320,note:"きのこで食物繊維◎"}},
  4:{lunch:{name:"鶏ひき肉と野菜のカレー",items:["鶏ひき肉100g","雑穀ご飯100g","ヨーグルトサラダ","らっきょう"],kcal:450,note:"ヨーグルト×らっきょうで腸活"},dinner:{name:"豆腐ステーキ＋キムチ鍋",items:["木綿豆腐150g","豚もも50g","キムチ","白菜","えのき"],kcal:360,note:"キムチ・豆腐で腸活◎"}},
  5:{lunch:{name:"和風グリルチキンサラダ",items:["鶏むね肉120g","雑穀ご飯80g","千切りキャベツ","ポン酢ドレッシング","味噌汁"],kcal:400,note:"キャベツで食物繊維◎"},dinner:{name:"鮭と根菜の炊き込みご飯",items:["鮭70g","雑穀ご飯100g","れんこん","ごぼう","水菜のぬか漬け"],kcal:380,note:"根菜×ぬか漬けで腸活"}},
  6:{lunch:{name:"ヘルシー天丼（オーブン）",items:["えび","さつまいも","雑穀ご飯100g","なめこの味噌汁","ほうれん草おひたし"],kcal:430,note:"なめこ×味噌で腸活◎"},dinner:{name:"豆乳鍋",items:["豆乳ベース","鶏むね肉100g","白菜","えのき","豆腐","味噌少量"],kcal:350,note:"豆乳×味噌で腸活◎"}}
};
const DW={
  0:{type:"筋トレ",label:"🦵 下半身",color:"#9B6FD4",details:["スクワット 4×15","ランジ 3×12（片足）","ヒップスラスト 4×15","カーフレイズ 3×20","レッグカール 3×12"]},
  1:{type:"有酸素",label:"🏃 有酸素",color:"#4A9B6F",details:["ウォーキング or 軽ジョグ 30〜40分","心拍数120〜140bpm目安","終わりに10分ストレッチ"]},
  2:{type:"筋トレ",label:"💪 上半身・体幹",color:"#9B6FD4",details:["プランク 3×60秒","サイドプランク 3×30秒（両側）","プッシュアップ 3×12","ダンベルロウ 3×12","腹筋クランチ 3×20"]},
  3:{type:"有酸素",label:"🚴 有酸素 or 休息",color:"#4A9B6F",details:["軽い有酸素 or アクティブレスト","ヨガ・ストレッチ30分でも◎","無理せず体調優先"]},
  4:{type:"筋トレ",label:"🔥 全身",color:"#9B6FD4",details:["バーピー 3×10","スクワットジャンプ 3×15","プッシュアップ 3×12","マウンテンクライマー 3×30秒","デッドバグ 3×10"]},
  5:{type:"有酸素",label:"🚶 軽い有酸素",color:"#4A9B6F",details:["ウォーキング 30分","ストレッチ・ヨガ20分","軽めに体を動かす"]},
  6:{type:"休養",label:"😴 完全休養",color:"#AAAAAA",details:["完全休養日","十分な睡眠を取る","翌週に向けてリカバリー"]}
};
function dkey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function getDays(s,e){const a=[];let c=new Date(s);while(c<=e){a.push(new Date(c));c.setDate(c.getDate()+1);}return a;}
function getWN(d){return Math.min(Math.floor((d-SD)/(7*86400000)),5);}
function buildWeeks(days){const ws=[];let w=Array(days[0].getDay()).fill(null);days.forEach(d=>{w.push(d);if(d.getDay()===6){ws.push(w);w=[];}});if(w.length){while(w.length<7)w.push(null);ws.push(w);}return ws;}
function lsG(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function WGraph({weights}){
  const W=340,H=120,P=32;
  const ad=getDays(SD,ED);
  const maxK=SK+0.5,minK=GK-0.5;
  const xS=(i)=>P+(i/(ad.length-1))*(W-P*2);
  const yS=(kg)=>H-P/2-((kg-minK)/(maxK-minK))*(H-P);
  const tp=ad.map((_,i)=>`${xS(i)},${yS(SK-(SK-GK)*(i/(ad.length-1)))}`).join(" ");
  const ents=ad.map((d,i)=>({i,k:dkey(d),kg:weights[dkey(d)]})).filter(e=>e.kg!=null);
  return(<svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
    {[48,47,46,45,44].map(kg=>(<g key={kg}><line x1={P} x2={W-P/2} y1={yS(kg)} y2={yS(kg)} stroke="#EEE" strokeWidth="1"/><text x={P-4} y={yS(kg)+4} fontSize="8" fill="#BBB" textAnchor="end">{kg}</text></g>))}
    <polyline points={tp} fill="none" stroke="#E8A0BF" strokeWidth="1.5" strokeDasharray="4,3" opacity="0.7"/>
    {ents.length>1&&<polyline points={ents.map(e=>`${xS(e.i)},${yS(e.kg)}`).join(" ")} fill="none" stroke="#9B6FD4" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}
    {ents.map(e=><circle key={e.k} cx={xS(e.i)} cy={yS(e.kg)} r="3.5" fill="#9B6FD4" stroke="#fff" strokeWidth="1.5"/>)}
    <text x={W-P/2+2} y={yS(GK)+4} fontSize="8" fill="#E8A0BF">44</text>
    <text x={W/2} y={H-2} fontSize="8" fill="#CCC" textAnchor="middle">6/25 → 8/8</text>
  </svg>);
}

function EditModal({type,dateLabel,data,onSave,onClose}){
  const [form,setForm]=useState(()=>JSON.parse(JSON.stringify(data)));
  const inp={width:"100%",border:"1.5px solid #E0D0F0",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",background:"#FDFAFF"};
  const lbl={fontSize:11,color:"#999",display:"block",marginBottom:4,marginTop:10};
  return(
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div style={{background:PG,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div><p style={{color:"rgba(255,255,255,0.8)",fontSize:10,margin:0}}>編集 — {dateLabel}</p><h3 style={{color:"#fff",fontSize:16,fontWeight:800,margin:"2px 0 0"}}>{type==="meal"?"献立":"トレーニング"}</h3></div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.25)",border:"none",borderRadius:8,color:"#fff",padding:"6px 12px",fontSize:13}}>✕</button>
        </div>
        <div className="modal-body">
          {type==="meal"?(["lunch","dinner"].map(slot=>(
            <div key={slot} style={{marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span>{slot==="lunch"?"☀️":"🌙"}</span><span style={{fontSize:13,fontWeight:700,color:slot==="lunch"?"#E8A0BF":"#8090E0"}}>{slot==="lunch"?"昼食":"夕食"}</span></div>
              <label style={lbl}>料理名</label><input style={inp} value={form[slot].name} onChange={e=>setForm(f=>({...f,[slot]:{...f[slot],name:e.target.value}}))}/>
              <label style={lbl}>カロリー（kcal）</label><input style={{...inp,width:120}} type="number" value={form[slot].kcal} onChange={e=>setForm(f=>({...f,[slot]:{...f[slot],kcal:parseInt(e.target.value)||0}}))}/>
              <label style={lbl}>腸活メモ</label><input style={inp} value={form[slot].note} onChange={e=>setForm(f=>({...f,[slot]:{...f[slot],note:e.target.value}}))}/>
              <label style={lbl}>食材・メニュー</label>
              {form[slot].items.map((item,idx)=>(
                <div key={idx} style={{display:"flex",gap:6,marginBottom:6}}>
                  <input style={{...inp,flex:1}} value={item} onChange={e=>setForm(f=>{const it=[...f[slot].items];it[idx]=e.target.value;return{...f,[slot]:{...f[slot],items:it}};})}/>
                  <button onClick={()=>setForm(f=>({...f,[slot]:{...f[slot],items:f[slot].items.filter((_,i)=>i!==idx)}}))} style={{background:"#FFE8EE",border:"none",borderRadius:8,color:"#E05A7A",padding:"0 12px",fontSize:16,flexShrink:0}}>−</button>
                </div>
              ))}
              <button onClick={()=>setForm(f=>({...f,[slot]:{...f[slot],items:[...f[slot].items,""]}}))} style={{background:"#F4EEFF",border:"none",borderRadius:8,color:"#9B6FD4",padding:"7px 14px",fontSize:12,fontWeight:700}}>＋ 食材を追加</button>
              {slot==="lunch"&&<div style={{borderBottom:"1px solid #F0E8FC",marginTop:16}}/>}
            </div>
          ))):(
            <div>
              <label style={lbl}>トレーニング名</label><input style={inp} value={form.label} onChange={e=>setForm(f=>({...f,label:e.target.value}))}/>
              <label style={lbl}>種別</label>
              <div style={{display:"flex",gap:8,marginTop:4}}>
                {["筋トレ","有酸素","休養"].map(t=>(
                  <button key={t} onClick={()=>setForm(f=>({...f,type:t,color:t==="筋トレ"?"#9B6FD4":t==="有酸素"?"#4A9B6F":"#AAAAAA"}))}
                    style={{flex:1,padding:"7px 0",border:"none",borderRadius:8,fontSize:12,fontWeight:700,background:form.type===t?(t==="筋トレ"?"#9B6FD4":t==="有酸素"?"#4A9B6F":"#AAAAAA"):"#F4EEFF",color:form.type===t?"#fff":"#888"}}>{t}</button>
                ))}
              </div>
              <label style={{...lbl,marginTop:14}}>メニュー</label>
              {form.details.map((d,idx)=>(
                <div key={idx} style={{display:"flex",gap:6,marginBottom:6}}>
                  <input style={{...inp,flex:1}} value={d} onChange={e=>setForm(f=>{const det=[...f.details];det[idx]=e.target.value;return{...f,details:det};})}/>
                  <button onClick={()=>setForm(f=>({...f,details:f.details.filter((_,i)=>i!==idx)}))} style={{background:"#FFE8EE",border:"none",borderRadius:8,color:"#E05A7A",padding:"0 12px",fontSize:16,flexShrink:0}}>−</button>
                </div>
              ))}
              <button onClick={()=>setForm(f=>({...f,details:[...f.details,""]}))} style={{background:"#F4EEFF",border:"none",borderRadius:8,color:"#9B6FD4",padding:"7px 14px",fontSize:12,fontWeight:700}}>＋ メニューを追加</button>
            </div>
          )}
        </div>
        <div style={{padding:"12px 16px",borderTop:"1px solid #F0E8FC",flexShrink:0}}>
          <button onClick={()=>onSave(form)} style={{width:"100%",background:PG,color:"#fff",border:"none",borderRadius:12,padding:"14px 0",fontSize:15,fontWeight:800}}>保存する 🌸</button>
        </div>
      </div>
    </div>
  );
}

function CalBar({intake,burned,bmr}){
  const total=bmr+burned,def=total-intake,pct=Math.min(100,Math.round((intake/total)*100));
  const dc=def>=0?"#4A9B6F":"#E05A7A";
  return(
    <div className="card">
      <p style={{fontSize:13,fontWeight:700,color:"#9B6FD4",margin:"0 0 12px"}}>🔥 カロリーバランス</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[["摂取",intake,"#E8A0BF"],["消費",total,"#9B6FD4"],["収支",def>=0?`-${def}`:`+${Math.abs(def)}`,dc]].map(([l,v,c])=>(
          <div key={l} style={{background:"#F8F5FF",borderRadius:12,padding:"10px 6px",textAlign:"center"}}>
            <p style={{fontSize:10,color:"#AAA",margin:"0 0 2px"}}>{l}</p>
            <p style={{fontSize:17,fontWeight:800,color:c,margin:0,lineHeight:1}}>{v}</p>
            <p style={{fontSize:9,color:"#CCC",margin:"2px 0 0"}}>kcal</p>
          </div>
        ))}
      </div>
      <div style={{background:"#F0E8FC",borderRadius:99,height:8,overflow:"hidden",marginBottom:6}}>
        <div style={{height:"100%",borderRadius:99,background:PG,width:`${pct}%`,transition:"width 0.4s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#BBB"}}>
        <span>摂取 {intake}kcal</span>
        <span style={{color:dc,fontWeight:700}}>{def>=0?"赤字":"黒字"} {Math.abs(def)}kcal</span>
        <span>消費 {total}kcal</span>
      </div>
      <div style={{marginTop:10,background:"#F8F5FF",borderRadius:10,padding:"8px 12px",fontSize:11,color:"#888",lineHeight:1.8}}>
        基礎代謝 {bmr}kcal ＋ 運動消費 {burned}kcal ＝ 総消費 {total}kcal
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("today");
  const [sel,setSel]=useState(null);
  const [weights,setW]=useState(()=>lsG("dj_w")||{});
  const [checks,setC]=useState(()=>lsG("dj_c")||{});
  const [ovr,setO]=useState(()=>lsG("dj_o")||{});
  const [wi,setWi]=useState("");
  const [bi,setBi]=useState("");
  const [toast,setT]=useState(null);
  const [em,setEm]=useState(null);
  const tr=useRef(null);
  function sw(v){setW(v);lsS("dj_w",v);}
  function sc(v){setC(v);lsS("dj_c",v);}
  function so(v){setO(v);lsS("dj_o",v);}
  function st(m){setT(m);clearTimeout(tr.current);tr.current=setTimeout(()=>setT(null),2200);}
  const now=new Date();now.setHours(0,0,0,0);
  const tk=dkey(now);
  const vd=sel||now;
  const vk=dkey(vd);
  const dow=vd.getDay();
  const dOvr=ovr[vk]||{};
  const meal=dOvr.meal||DM[dow];
  const workout=dOvr.workout||DW[dow];
  const wn=getWN(vd);
  const tgt=WT[wn]||GK;
  const ad=getDays(SD,ED);
  const weeks=buildWeeks(ad);
  const tw=weights[tk];
  const lk=Object.keys(weights).sort().reverse()[0];
  const lkg=lk?weights[lk]:SK;
  const rem=(lkg-GK).toFixed(1);
  const dl=Math.max(0,Math.ceil((ED-now)/86400000));
  const chkd=checks[vk]||[];
  const done=workout.details.every((_,i)=>chkd.includes(i));
  const BMR=1250,bb=BN[workout.type]||60,mb=dOvr.burnOverride;
  const eb=mb!=null?mb:bb;
  const intake=180+meal.lunch.kcal+meal.dinner.kcal;
  const vdl=`${vd.getMonth()+1}/${vd.getDate()}（${DL[dow]}）`;
  const pct=Math.min(100,Math.max(0,((SK-lkg)/(SK-GK))*100));
  function tc(i){const cur=checks[vk]||[];const nxt=cur.includes(i)?cur.filter(x=>x!==i):[...cur,i];sc({...checks,[vk]:nxt});if(!cur.includes(i))st("✅ チェックしました！");}
  function hwS(){const v=parseFloat(wi);if(isNaN(v)||v<30||v>80){st("⚠️ 正しい体重を入力してね");return;}sw({...weights,[tk]:v});setWi("");st("🌸 記録しました！");}
  function hbS(){const v=parseInt(bi);if(isNaN(v)||v<0){st("⚠️ 正しい値を入力してね");return;}so({...ovr,[vk]:{...dOvr,burnOverride:v}});setBi("");st("🔥 消費カロリーを更新！");}
  function heS(data){so({...ovr,[vk]:{...dOvr,[em.type]:data}});setEm(null);st("✏️ 保存しました！");}
  const eb2=(lbl,fn)=><button onClick={fn} style={{background:"#F4EEFF",border:"none",borderRadius:8,color:"#9B6FD4",padding:"5px 10px",fontSize:11,fontWeight:700}}>✏️ {lbl}</button>;
  return(
    <div style={{minHeight:"100vh",background:"#F7F3FB"}}>
      {toast&&<div className="toast">{toast}</div>}
      {em&&<EditModal type={em.type} dateLabel={vdl} data={em.type==="meal"?meal:workout} onSave={heS} onClose={()=>setEm(null)}/>}
      <div style={{background:PG,padding:"20px 20px 16px",boxShadow:"0 2px 12px rgba(180,120,200,0.18)"}}>
        <p style={{color:"rgba(255,255,255,0.8)",fontSize:10,margin:0,letterSpacing:2}}>DIET JOURNEY</p>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginTop:4}}>
          <div><h1 style={{color:"#fff",fontSize:26,fontWeight:800,margin:0}}>{lkg.toFixed(1)} <span style={{fontSize:14,fontWeight:500}}>kg</span></h1><p style={{color:"rgba(255,255,255,0.85)",fontSize:12,margin:"2px 0 0"}}>あと <strong>{rem}kg</strong> → 残り <strong>{dl}日</strong></p></div>
          <div style={{textAlign:"right"}}><p style={{color:"rgba(255,255,255,0.7)",fontSize:10,margin:0}}>GOAL 8/8</p><p style={{color:"#fff",fontSize:20,fontWeight:800,margin:0}}>44.0 kg</p></div>
        </div>
        <div style={{marginTop:12,background:"rgba(255,255,255,0.25)",borderRadius:99,height:6,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:99,background:"#fff",width:`${pct}%`,transition:"width 0.4s"}}/>
        </div>
        <p style={{color:"rgba(255,255,255,0.7)",fontSize:10,margin:"4px 0 0",textAlign:"right"}}>{Math.round(pct)}% 達成</p>
      </div>
      <div style={{display:"flex",background:"#fff",borderBottom:"2px solid #F0E8FC"}}>
        {[["today","今日"],["calendar","カレンダー"],["graph","グラフ"]].map(([k,l])=>(
          <button key={k} className="tab-btn" onClick={()=>setTab(k)} style={{fontWeight:tab===k?700:400,color:tab===k?"#9B6FD4":"#AAA",borderBottom:tab===k?"2px solid #9B6FD4":"2px solid transparent"}}>{l}</button>
        ))}
      </div>
      <div style={{padding:"16px 14px 90px"}}>
        {tab==="today"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <button onClick={()=>{const d=new Date(vd);d.setDate(d.getDate()-1);if(d>=SD)setSel(d);}} style={{background:"#F4EEFF",border:"none",borderRadius:8,color:"#9B6FD4",padding:"6px 12px",fontSize:16}}>‹</button>
            <p style={{fontSize:13,color:"#666",margin:0,fontWeight:600}}>{vdl} — W{wn+1} 目標 {tgt}kg</p>
            <button onClick={()=>{const d=new Date(vd);d.setDate(d.getDate()+1);if(d<=ED)setSel(d);}} style={{background:"#F4EEFF",border:"none",borderRadius:8,color:"#9B6FD4",padding:"6px 12px",fontSize:16}}>›</button>
          </div>
          <CalBar intake={intake} burned={eb} bmr={BMR}/>
          <div className="card" style={{paddingTop:12,paddingBottom:12}}>
            <p style={{fontSize:12,fontWeight:700,color:"#9B6FD4",margin:"0 0 8px"}}>🏃 運動消費カロリーを手動入力（任意）</p>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="number" min="0" max="2000" placeholder={`自動: ${bb}kcal`} value={bi} onChange={e=>setBi(e.target.value)} style={{flex:1,border:"1.5px solid #DDD",borderRadius:10,padding:"8px 12px",fontSize:14,outline:"none"}}/>
              <span style={{fontSize:13,color:"#888"}}>kcal</span>
              <button onClick={hbS} style={{background:PG,color:"#fff",border:"none",borderRadius:10,padding:"8px 14px",fontWeight:700,fontSize:12}}>更新</button>
              {mb!=null&&<button onClick={()=>so({...ovr,[vk]:{...dOvr,burnOverride:undefined}})} style={{background:"#FFE8EE",color:"#E05A7A",border:"none",borderRadius:8,padding:"8px 10px",fontSize:11}}>リセット</button>}
            </div>
            {mb!=null&&<p style={{fontSize:11,color:"#9B6FD4",margin:"6px 0 0"}}>手動入力中: {mb}kcal</p>}
          </div>
          <div className="card">
            <p style={{fontSize:13,fontWeight:700,color:"#9B6FD4",margin:"0 0 10px"}}>⚖️ 今日の体重を記録</p>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="number" step="0.1" min="30" max="80" placeholder={tw?`${tw}kg（記録済み）`:"例：47.2"} value={wi} onChange={e=>setWi(e.target.value)} style={{flex:1,border:"1.5px solid #DDD",borderRadius:10,padding:"10px 12px",fontSize:15,outline:"none",background:tw?"#FAF5FF":"#fff"}}/>
              <span style={{fontSize:14,color:"#888"}}>kg</span>
              <button onClick={hwS} style={{background:PG,color:"#fff",border:"none",borderRadius:10,padding:"10px 16px",fontWeight:700,fontSize:13}}>保存</button>
            </div>
            {tw&&<p style={{fontSize:12,color:"#9B6FD4",margin:"8px 0 0"}}>今日の記録：{tw}kg ✓</p>}
          </div>
          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <p style={{fontSize:13,fontWeight:700,color:workout.color,margin:0}}>{workout.label}</p>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>{done&&<span style={{fontSize:11,color:"#4A9B6F",fontWeight:700}}>✅ 完了！</span>}{eb2("編集",()=>setEm({type:"workout"}))}</div>
            </div>
            {workout.details.map((d,i)=>{const dn=chkd.includes(i);return(
              <div key={i} onClick={()=>tc(i)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",marginBottom:4,borderRadius:10,cursor:"pointer",background:dn?`${workout.color}18`:"#F8F6FF",border:dn?`1.5px solid ${workout.color}55`:"1.5px solid transparent",transition:"all 0.15s"}}>
                <div style={{width:20,height:20,borderRadius:6,flexShrink:0,background:dn?workout.color:"#E8E0F0",display:"flex",alignItems:"center",justifyContent:"center"}}>{dn&&<span style={{color:"#fff",fontSize:12}}>✓</span>}</div>
                <span style={{fontSize:13,color:dn?"#555":"#333",textDecoration:dn?"line-through":"none"}}>{d}</span>
              </div>
            );})}
          </div>
          {[["☀️ 昼食","lunch","#E8A0BF","#FFF5F9"],["🌙 夕食","dinner","#8090E0","#F0F4FF"]].map(([lbl,slot,ac,bg])=>(
            <div key={slot} className="card">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}><p style={{fontSize:13,fontWeight:700,color:ac,margin:0}}>{lbl}</p><span style={{fontSize:11,color:"#AAA"}}>約{meal[slot].kcal}kcal</span></div>
                {eb2("編集",()=>setEm({type:"meal"}))}
              </div>
              <p style={{fontSize:14,fontWeight:700,color:"#333",margin:"0 0 8px"}}>{meal[slot].name}</p>
              <div style={{background:bg,borderRadius:10,padding:"8px 10px",borderLeft:`3px solid ${ac}`}}>
                {meal[slot].items.map((item,i)=><div key={i} style={{fontSize:12,color:"#555",padding:"2px 0"}}><span style={{color:ac}}>• </span>{item}</div>)}
              </div>
              <div style={{marginTop:8,display:"inline-block",background:`${ac}22`,borderRadius:6,padding:"3px 8px",fontSize:11,color:ac}}>🦠 {meal[slot].note}</div>
            </div>
          ))}
          <div style={{background:"#FFFBEA",borderRadius:14,padding:"12px 14px",borderLeft:"3px solid #F0C060"}}>
            <p style={{fontSize:12,fontWeight:700,color:"#B08020",margin:"0 0 4px"}}>🌱 腸活チェック</p>
            <p style={{fontSize:12,color:"#666",margin:0,lineHeight:1.7}}>発酵食品（味噌・ぬか漬け・納豆・キムチ・ヨーグルト）を1種以上 ／ 水1.5〜2L ／ 野菜・海藻・きのこを意識して🌿</p>
          </div>
        </div>}
        {tab==="calendar"&&<div>
          <div style={{background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 12px rgba(155,111,212,0.09)",marginBottom:14}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#F4EEFF"}}>
              {DL.map((d,i)=><div key={d} style={{textAlign:"center",padding:"8px 2px",fontSize:11,fontWeight:700,color:i===0?"#E05A7A":i===6?"#5A7AE0":"#666"}}>{d}</div>)}
            </div>
            {weeks.map((week,wi2)=>(
              <div key={wi2} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderTop:"1px solid #F0E8FC"}}>
                {week.map((day,di)=>{
                  if(!day)return<div key={di} style={{minHeight:52}}/>;
                  const dk2=dkey(day),dd=day.getDay();
                  const w2=(ovr[dk2]?.workout)||DW[dd];
                  const isSel=sel&&dkey(sel)===dk2,isTod=dk2===tk,isGoal=day.toDateString()===ED.toDateString();
                  return(
                    <div key={di} onClick={()=>{setSel(day);setTab("today");}} style={{minHeight:52,padding:"3px 2px",cursor:"pointer",background:isSel?"#EDE0FF":isGoal?"#FFF3E0":"transparent",border:isSel?"2px solid #9B6FD4":isGoal?"2px solid #F0A050":"2px solid transparent",borderRadius:8,margin:1,transition:"all 0.12s"}}>
                      <div style={{fontSize:11,fontWeight:isTod||isGoal?800:500,color:isGoal?"#E07020":isTod?"#9B6FD4":dd===0?"#E05A7A":dd===6?"#5A7AE0":"#333",textAlign:"center"}}>
                        {day.getDate()}
                        {isGoal&&<div style={{fontSize:7,color:"#E07020"}}>GOAL🎯</div>}
                        {isTod&&!isGoal&&<div style={{fontSize:7,color:"#9B6FD4"}}>TODAY</div>}
                      </div>
                      <div style={{textAlign:"center",marginTop:1}}><span style={{fontSize:9,background:w2.color,color:"#fff",borderRadius:3,padding:"1px 3px",fontWeight:600}}>{w2.type==="筋トレ"?"💪":w2.type==="有酸素"?"🏃":"😴"}</span></div>
                      <div style={{textAlign:"center",fontSize:9,marginTop:1}}>
                        {weights[dk2]&&<span style={{color:"#9B6FD4"}}>⚖</span>}
                        {(checks[dk2]||[]).length===w2.details.length&&<span style={{color:"#4A9B6F"}}>✓</span>}
                        {ovr[dk2]&&<span style={{color:"#E8A0BF"}}>✏</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
          <div style={{background:"#F4EEFF",borderRadius:12,padding:"10px 14px",fontSize:11,color:"#9B6FD4",lineHeight:1.8}}>💡 日付をタップ →「今日」タブで編集できます。✏ は個別編集済みの日。</div>
        </div>}
        {tab==="graph"&&<div>
          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <p style={{fontSize:13,fontWeight:700,color:"#9B6FD4",margin:0}}>📈 体重推移</p>
              <div style={{display:"flex",gap:10,fontSize:10,color:"#AAA"}}><span style={{color:"#9B6FD4"}}>— 実測</span><span style={{color:"#E8A0BF"}}>-- 目標</span></div>
            </div>
            <WGraph weights={weights}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {[["現在",`${lkg.toFixed(1)}kg`,"#9B6FD4"],["目標まで",`-${rem}kg`,"#E8A0BF"],["残り日数",`${dl}日`,"#4A9B6F"],["記録日数",`${Object.keys(weights).length}日`,"#F0A050"]].map(([l,v,c])=>(
              <div key={l} style={{background:"#fff",borderRadius:14,padding:"14px 16px",boxShadow:"0 2px 12px rgba(155,111,212,0.09)",textAlign:"center"}}>
                <p style={{fontSize:11,color:"#AAA",margin:"0 0 4px"}}>{l}</p><p style={{fontSize:22,fontWeight:800,color:c,margin:0}}>{v}</p>
              </div>
            ))}
          </div>
          <div className="card">
            <p style={{fontSize:13,fontWeight:700,color:"#9B6FD4",margin:"0 0 10px"}}>📋 体重記録</p>
            {Object.keys(weights).sort().reverse().length===0?<p style={{fontSize:12,color:"#BBB",textAlign:"center",padding:"16px 0"}}>まだ記録がありません🌸</p>:(
              Object.keys(weights).sort().reverse().map(k=>{
                const sorted=Object.keys(weights).sort(),prev=sorted[sorted.indexOf(k)-1],diff=prev?weights[k]-weights[prev]:0;
                return(
                  <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #F4EEFF"}}>
                    <span style={{fontSize:12,color:"#555"}}>{k.slice(5).replace("-","/")} <span style={{color:"#CCC",fontSize:10}}>W{getWN(new Date(k))+1}</span></span>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      {diff!==0&&<span style={{fontSize:11,color:diff<0?"#4A9B6F":"#E05A7A"}}>{diff>0?"+":""}{diff.toFixed(1)}</span>}
                      <span style={{fontSize:14,fontWeight:700,color:"#9B6FD4"}}>{weights[k].toFixed(1)}kg</span>
                      <button onClick={()=>{const u={...weights};delete u[k];sw(u);}} style={{background:"none",border:"none",color:"#DDD",fontSize:13,padding:0}}>✕</button>
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(255,255,255,0.95)",borderTop:"1px solid #F0E8FC",padding:"8px 0",display:"flex",justifyContent:"center",gap:32,backdropFilter:"blur(8px)",zIndex:100}}>
        {[["today","今日","🌸"],["calendar","カレンダー","📅"],["graph","グラフ","📊"]].map(([k,l,ic])=>(
          <button key={k} className="nav-btn" onClick={()=>setTab(k)}>
            <span style={{fontSize:18}}>{ic}</span>
            <span style={{fontSize:10,color:tab===k?"#9B6FD4":"#BBB",fontWeight:tab===k?700:400}}>{l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
